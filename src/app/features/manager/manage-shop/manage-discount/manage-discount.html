<p-toast position="bottom-center"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-menu-manager>
  <div class="page-container">
    <div class="content-wrapper">
      <!-- Header -->
      <div class="header-action">
        <div class="header-left">
          <button
            pButton
            pRipple
            icon="pi pi-arrow-left"
            class="p-button-text back-btn"
            (click)="goBackToShop()"
            title="กลับไปตั้งค่าร้าน"
          ></button>
          <h2 class="section-header">ตั้งค่าส่วนลด</h2>
        </div>
        <div class="action-right">
          <button
            pButton
            pRipple
            label="เพิ่มส่วนลดใหม่"
            icon="pi pi-plus"
            class="p-button-success add-btn"
            (click)="openAddDialog()"
          ></button>
        </div>
      </div>

      <!-- ตารางส่วนลด -->
      <div class="table-card">
        <div class="card-header-flex">
          <h3 class="card-title">
            <i class="pi pi-percentage mr-2"></i>ส่วนลดทั้งหมด ({{ discounts.length }})
          </h3>
        </div>

        <p-table
          [value]="discounts"
          [loading]="isLoading"
          styleClass="dark-table mt-3"
          responsiveLayout="scroll"
        >
          <ng-template pTemplate="header">
            <tr>
              <th>ชื่อส่วนลด</th>
              <th style="text-align: center">มูลค่า</th>
              <th>วันเริ่ม - สิ้นสุด</th>
              <th style="text-align: center">สถานะ</th>
              <th style="width: 120px; text-align: center">จัดการ</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-item>
            <tr>
              <td>{{ item.discount_Name }}</td>
              <td class="highlight-text text-center">
                {{ item.discount_amount }}{{ formatType(item.discount_Type) }}
              </td>
              <td>
                {{ item.startDate | date: 'dd/MM/yyyy' }} - {{ item.endDate | date: 'dd/MM/yyyy' }}
              </td>
              <td class="text-center">
                <p-tag
                  [value]="isActive(item) ? 'กำลังใช้งาน' : 'ไม่ใช้งาน'"
                  [severity]="isActive(item) ? 'success' : 'secondary'"
                ></p-tag>
              </td>
              <td>
                <div class="action-buttons">
                  <button
                    pButton
                    pRipple
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text"
                    (click)="openEditDialog(item)"
                  ></button>
                  <button
                    pButton
                    pRipple
                    icon="pi pi-trash"
                    class="p-button-rounded p-button-text p-button-danger"
                    (click)="deleteDiscount(item)"
                  ></button>
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="5" class="empty-row">ยังไม่มีข้อมูลส่วนลด</td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>
</app-menu-manager>

<!-- Dialog: เพิ่ม/แก้ไขส่วนลด -->
<p-dialog
  [(visible)]="showDialog"
  [modal]="true"
  [style]="{ width: '420px' }"
  [header]="isEditMode ? 'แก้ไขส่วนลด' : 'เพิ่มส่วนลดใหม่'"
  [draggable]="false"
  styleClass="dark-dialog"
>
  <div class="dialog-form">
    <div class="form-row">
      <label class="form-label">ชื่อส่วนลด</label>
      <input
        type="text"
        [(ngModel)]="form.discount_Name"
        placeholder="เช่น โปรวันเกิด"
        class="dark-input w-full"
      />
    </div>

    <div class="form-row">
      <label class="form-label">ประเภทส่วนลด</label>
      <select [(ngModel)]="form.discount_Type" class="dark-input w-full">
        <option value="percent">เปอร์เซ็นต์ (%)</option>
        <option value="fixed">จำนวนเงิน (บาท)</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">มูลค่าส่วนลด</label>
      <input
        type="number"
        min="0"
        [(ngModel)]="form.discount_amount"
        class="dark-input w-full text-center"
      />
    </div>

    <div class="date-row">
      <div class="form-row">
        <label class="form-label">วันเริ่ม</label>
        <input type="date" [(ngModel)]="form.startDate" class="dark-input w-full" />
      </div>
      <div class="form-row">
        <label class="form-label">วันสิ้นสุด</label>
        <input type="date" [(ngModel)]="form.endDate" class="dark-input w-full" />
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button pButton label="ยกเลิก" class="p-button-text" (click)="closeDialog()"></button>
    <button
      pButton
      label="บันทึก"
      icon="pi pi-check"
      class="p-button-success"
      [loading]="isSaving"
      (click)="saveDiscount()"
    ></button>
  </ng-template>
</p-dialog>
