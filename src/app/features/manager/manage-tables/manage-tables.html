<p-toast [breakpoints]="{ '120px': { width: '50%' } }" />
<app-menu-manager class="menu">
  <div class="booking-container">
    <header class="page-header">
      <h3>จัดการข้อมูลโต๊ะ</h3>
      <div class="header-actions">
        <button class="btn-print-all" (click)="downloadAllTablesPDF()">
          <mat-icon>print</mat-icon>
          <span>พิมพ์ QR ทั้งหมด (A4)</span>
        </button>
      </div>
    </header>

    <div class="tables-grid-wrapper">
      <div class="num-table">
        <div class="table-count-info">
          <span>จำนวนโต๊ะ</span>
          <span class="count-number">{{ totalTable }}</span>
        </div>

        <button class="status-btn" routerLink="/BookingStatus">
          <mat-icon>edit</mat-icon>
          <span>จัดการโต๊ะ</span>
        </button>
      </div>

      <div class="tables-grid">
        <div
          *ngFor="let table of tables"
          class="table-item"
          (click)="showQr(table.table_id)"
          [ngClass]="{
            'status-free': table.table_Status === 'ว่าง',
            'status-reserved': table.table_Status === 'ติดจอง',
            'status-occupied': table.table_Status === 'ไม่ว่าง',
          }"
        >
          <span>{{ table.table_Number }}</span>
          <span class="tooltip-text" *ngIf="table.table_Status === 'ติดจอง'"> ติดจอง </span>
          <span class="tooltip-text" *ngIf="table.table_Status === 'ไม่ว่าง'">
            กำลังให้บริการ
          </span>
          <span class="tooltip-text" *ngIf="table.table_Status === 'ว่าง'"> ว่าง </span>
        </div>
      </div>

      <div class="modal-overlay" *ngIf="showAddTableModal">
        <div class="modal-content add-table-modal">
          <div class="modal-header">
            <h3>เพิ่มโต๊ะ</h3>
            <button class="close-icon-btn" (click)="toggleAddTableModal(false)">✕</button>
          </div>

          <div class="modal-body">
            <label>เลขโต๊ะ</label>
            <div class="input-wrapper">
              <input type="text" placeholder="10" [(ngModel)]="tableNumber" />
              <mat-icon>table_restaurant</mat-icon>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn-cancel" (click)="toggleAddTableModal(false)">ยกเลิก</button>
            <button class="btn-confirm" (click)="confirmAddTable()">เพิ่ม</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab-add-button" (click)="addTable()">
    <mat-icon>add</mat-icon>
  </button>
</app-menu-manager>

<p-dialog
  header="โต๊ะ{{ selectedTable?.table_Number }}"
  [(visible)]="displayShowQr"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="custom-dark-dialog"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  [style]="{ width: '400px' }"
  appendTo="body"
>
  <div class="qr-display-container">
    <div class="qr-wrapper" *ngIf="selectedTable?.table_QR_Code">
      <img
        [src]="selectedTable.table_QR_Code"
        alt="QR Code Table {{ selectedTable.table_Number }}"
        class="qr-image"
      />
    </div>
    <div style="margin-top: 2rem; width: 100%; display: flex; gap: 10px">
      <button
        style="
          flex: 1;
          padding: 12px;
          border-radius: 12px;
          background: #916400;
          color: white;
          border: none;
          font-weight: bold;
          cursor: pointer;
        "
        (click)="downloadTablePDF()"
      >
        บันทึกรูป
      </button>
      <button
        style="
          padding: 12px;
          border-radius: 12px;
          background: #333;
          color: white;
          border: none;
          cursor: pointer;
        "
        (click)="displayShowQr = false"
      >
        ปิด
      </button>
    </div>
  </div>
</p-dialog>

<div id="print-section" class="print-template">
  <div class="qr-print-block">
    <h1 class="table-number-print">{{ selectedTable?.table_Number }}</h1>
    <img [src]="selectedTable?.table_QR_Code" class="qr-image-print" />
  </div>
</div>

<div id="print-area" class="print-only">
  <div *ngFor="let table of tables" class="qr-print-block">
    <h1 class="table-number-print">{{ table.table_Number }}</h1>
    <img [src]="table.table_QR_Code" class="qr-image-print" />
  </div>
</div>
